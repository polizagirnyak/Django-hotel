<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/rooms.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Отель</a>
            <div class="navbar-nav flex-row flex-wrap gap-1 align-items-center">
                <a class="nav-link px-2" href="#">Панель управления</a>
                <a class="nav-link px-2" href="{% url 'rooms_dashboard' %}">Комнаты</a>
                <a class="nav-link px-2" href="{% url 'chess_table' %}">Шахматка</a>
                <a class="nav-link px-2" href="{% url 'booking_dashboard' %}">🔑 Бронирования</a>
                <a class="nav-link px-2" href="{% url 'customer_list' %}">👥 Клиенты</a>
                <a class="nav-link px-2" href="{% url 'services_dashboard' %}">💆 Услуги</a>

                <div class="nav-item dropdown">
                    <a class="nav-link px-2 dropdown-toggle" href="#"
                       role="button" data-bs-toggle="dropdown">
                        📊 Аналитика
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li>
                            <a class="dropdown-item
                               {% if request.resolver_match.url_name == 'analytics_dashboard' %}active{% endif %}"
                               href="{% url 'analytics_dashboard' %}">📊 Дашборд</a>
                        </li>
                        <li>
                            <a class="dropdown-item
                               {% if request.resolver_match.url_name == 'analytics_report' %}active{% endif %}"
                               href="{% url 'analytics_report' %}">📈 Детальный отчёт</a>
                        </li>
                    </ul>
                </div>

                <a class="nav-link px-2" href="#">Поиск номеров</a>
                <a class="nav-link px-2" href="#">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
